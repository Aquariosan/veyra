services:
  postgres:
    image: postgres:16
    container_name: veyra-postgres
    environment:
      POSTGRES_DB: veyra
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - veyra_pgdata:/var/lib/postgresql/data

volumes:
  veyra_pgdata:
